## EMQX 5.x — MQTT-брокер для приёма телеметрии с IoT-устройств.
## Сообщения публикуются в топик fuel/sensors и забираются отдельным
## сервисом mqtt-kafka-bridge, который перекладывает их в Kafka.

node {
  name = "emqx@127.0.0.1"
  cookie = "emqxsecretcookie"
  data_dir = "/opt/emqx/data"
}

cluster {
  name = emqxcl
  discovery_strategy = manual
}

listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 5000
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
  max_connections = 5000
  websocket.mqtt_path = "/mqtt"
}

dashboard {
  listeners.http {
    bind = 18083
  }
  default_username = "admin"
  default_password = "public"
}

authentication = []

authorization {
  no_match = allow
  deny_action = ignore
  cache { enable = true }
  sources = []
}
