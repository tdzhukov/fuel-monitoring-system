apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fuel-service-hpa
  namespace: fuel-monitor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fuel-service
  minReplicas: 1
  maxReplicas: 9
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
