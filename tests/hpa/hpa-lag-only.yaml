apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fuel-service-hpa
  namespace: fuel-monitor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fuel-service
  minReplicas: 1
  maxReplicas: 9
  metrics:
  - type: External
    external:
      metric:
        name: kafka_consumergroup_lag
      target:
        type: AverageValue
        averageValue: "1000"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 4
        periodSeconds: 15
      - type: Percent
        value: 100
        periodSeconds: 15
      selectPolicy: Max
